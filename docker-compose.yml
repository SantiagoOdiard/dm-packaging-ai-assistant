version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      - ADMIN_API_KEY=changeme
      # - OPENAI_API_KEY=your_openai_key_here
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    ports:
      - '5173:80'
    depends_on:
      - backend
